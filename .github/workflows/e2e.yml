name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip the job when secrets aren't configured. Add POSTGRES_URL,
    # SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_URL, and
    # NEXT_PUBLIC_SUPABASE_ANON_KEY to repo secrets to enable.
    if: ${{ vars.E2E_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        project: [desktop, mobile]
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      # System deps first (apt), then browsers. Bounded so a stalled CDN fetch
      # fails in minutes instead of eating the whole job timeout.
      - run: npx playwright install-deps chromium
        timeout-minutes: 6
      - run: npx playwright install chromium
        timeout-minutes: 8
      - run: npx playwright test --project=${{ matrix.project }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
