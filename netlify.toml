# Netlify build config (the Next.js runtime is auto-detected).
#
# The site has NODE_ENV=production set as an env var, which makes Netlify's
# `npm ci` skip devDependencies. But this app's build tooling — typescript,
# tailwindcss, postcss, autoprefixer, eslint, @types/* — lives in
# devDependencies, so `next build` failed in the cloud with exit code 2 while
# succeeding locally (local reused a node_modules that already had the dev
# deps). Force dev deps to install so the production build has its tooling.
[build.environment]
  NPM_FLAGS = "--include=dev"
